name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release to NuGet
    runs-on: ubuntu-latest
    container: ghcr.io/angzarr-io/angzarr-csharp:latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify version matches tag
        run: |
          CSPROJ_VERSION=$(grep '<Version>' Angzarr.Client/Angzarr.Client.csproj | sed 's/.*<Version>\(.*\)<\/Version>.*/\1/')
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$CSPROJ_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Angzarr.Client.csproj version ($CSPROJ_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi

      - name: Build
        run: just build

      - name: Test
        run: just test

      - name: Pack
        run: just pack

      # Uncomment when ready to publish
      # - name: Publish to NuGet
      #   run: dotnet nuget push **/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json
